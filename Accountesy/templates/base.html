<!DOCTYPE html>
<html>
<head>
    <title>Accountesy</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="topbar">
        <div class="top-left">
            <div style="cursor:pointer; margin-right:15px;" onclick="toggleSidebar()">
                <i data-lucide="menu"></i>
            </div>
            <img src="/static/logo.png" style="height:70px;">
            <div class="brand-text">
                <div style="font-size:28px; font-weight:700;">Accountesy</div>
                <div style="font-size:12px; opacity:0.9;">Learn Smart, Grow Fast, Be Accounting Expert with Accountesy</div>
            </div>
        </div>
        <div class="top-right" style="display:flex; align-items:center; gap:25px;">
            <div style="position:relative; cursor:pointer;">
                <i data-lucide="bell"></i><span class="notif-dot"></span>
            </div>
            <div class="avatar">D</div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <nav class="nav-section" style="display:flex; flex-direction:column; gap:15px;">
            <a href="/" class="nav-item" style="color:white; text-decoration:none; display:flex; gap:10px;"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
            <a href="/workspace" class="nav-item" style="color:white; text-decoration:none; display:flex; gap:10px;"><i data-lucide="briefcase"></i><span>Workspace</span></a>
            <a href="/pricing" class="nav-item" style="color:white; text-decoration:none; display:flex; gap:10px;"><i data-lucide="credit-card"></i><span>Pricing</span></a>
            <a href="/history" class="nav-item" style="color:white; text-decoration:none; display:flex; gap:10px;"><i data-lucide="history"></i><span>History</span></a>
            {% if request.url.path.startswith('/admin') %}
            <a href="/admin" class="nav-item" style="color:white; text-decoration:none; display:flex; gap:10px;"><i data-lucide="shield"></i><span>Admin</span></a>
            {% endif %}
        </nav>
        <div class="sponsor-box">
            <div class="sponsor-text" style="font-size:10px;">Sponsored by</div>
            <div class="sponsor-text" style="font-size:14px; font-weight:600; margin:5px 0;">Uday Mondal | Tax Consultant</div>
            <img src="/static/logo1.png" style="width:50px; border-radius:5px;">
        </div>
    </div>

    <div class="main" style="margin-left:340px; padding:50px;">
        {% block content %}{% endblock %}
        <footer class="footer">
            © 2026 Accountesy | Created by <strong>Debasish Biswas</strong>
        </footer>
    </div>

    <script>
        function toggleSidebar() { document.getElementById("sidebar").classList.toggle("mini"); }
        lucide.createIcons();
    </script>
</body>
</html>
