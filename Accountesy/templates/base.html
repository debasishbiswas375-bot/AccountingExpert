<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountesy - Accounting Expert</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container" style="text-align: center; margin-bottom: 40px;">
            <img src="/static/logo.png" alt="Accountesy" style="width: 150px;">
        </div>
        
        <nav style="display: flex; flex-direction: column; gap: 10px;">
            <a href="/" class="nav-link">
                <i data-lucide="home"></i> Home / Features
            </a>
            <a href="/workspace" class="nav-link active">
                <i data-lucide="layout-dashboard"></i> Workspace
            </a>
            <a href="/pricing" class="nav-link">
                <i data-lucide="credit-card"></i> Pricing
            </a>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
            <a href="/history" class="nav-link">
                <i data-lucide="history"></i> History
            </a>
            <a href="/account" class="nav-link">
                <i data-lucide="settings"></i> Account
            </a>
        </nav>
    </div>

    <div class="main-wrapper">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
