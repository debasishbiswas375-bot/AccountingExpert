<!DOCTYPE html>
<html lang="en">
<head>
    <title>Accountesy - Accounting Expert</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --sidebar-width: 260px; --accent: #3b82f6; }
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: url('/static/b-logo.png') no-repeat center center fixed;
            background-size: contain; /* Fixes the 'huge' logo issue */
            background-color: #0f172a; color: white;
        }
        .topbar {
            height: 70px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .sidebar {
            width: var(--sidebar-width); height: 100vh;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            position: fixed; left: 0; top: 70px; padding: 30px 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 50px; /* 50px lined alignment */
            min-height: calc(100vh - 170px);
        }
        .footer {
            margin-left: var(--sidebar-width); padding: 30px 50px;
            text-align: center; border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
        }
        .sponsor-box {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px;
            text-align: center; margin-top: auto; position: absolute; bottom: 100px; width: 220px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div style="display: flex; align-items: center;">
            <img src="/static/logo.png" style="height: 40px; margin-right: 15px;">
            <span style="font-weight: 700; font-size: 20px;">Accountesy</span>
        </div>
        <a href="/auth/register" style="background: var(--accent); color: white; padding: 8px 20px; border-radius: 8px; text-decoration: none; font-weight: 600;">Register</a>
    </div>

    <div class="sidebar">
        <nav>
            <a href="/" style="display:block; color:white; text-decoration:none; margin-bottom:20px;"><i data-lucide="home"></i> Home</a>
            <a href="/dashboard" style="display:block; color:white; text-decoration:none;"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        </nav>
        <div class="sponsor-box">
            <p style="font-size: 10px; opacity:0.7;">Sponsored by</p>
            <img src="/static/logo1.png" style="width: 100%; border-radius: 8px; margin: 5px 0;">
            <p style="font-size: 11px;">Uday Mondal | Tax Consultant</p>
        </div>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <p>© 2026 Accountesy | Created by <strong>Debasish Biswas</strong></p>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
