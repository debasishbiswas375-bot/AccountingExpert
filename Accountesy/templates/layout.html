<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accounting Expert</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo-area">

<img src="/static/logo.png" class="logo">

<span class="logo-text">Accounting Expert</span>

</div>


<nav class="menu">

<a href="/dashboard" class="menu-item active">

<div class="icon">
<svg viewBox="0 0 24 24">
<rect x="3" y="3" width="7" height="7"/>
<rect x="14" y="3" width="7" height="7"/>
<rect x="14" y="14" width="7" height="7"/>
<rect x="3" y="14" width="7" height="7"/>
</svg>
</div>

<span>Dashboard</span>

</a>


<a href="/admin" class="menu-item">

<div class="icon">
<svg viewBox="0 0 24 24">
<path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7z"/>
</svg>
</div>

<span>Admin</span>

</a>


<a href="/billing" class="menu-item">

<div class="icon">
<svg viewBox="0 0 24 24">
<rect x="2" y="5" width="20" height="14"/>
<line x1="2" y1="10" x2="22" y2="10"/>
</svg>
</div>

<span>Billing</span>

</a>


<a href="/settings" class="menu-item">

<div class="icon">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<path d="M19.4 15a1.6 1.6 0 0 0 .3 1.7l.1.1-2 3.4-1.2-.5a1.6 1.6 0 0 0-1.9.5l-.4.8H9.7l-.4-.8a1.6 1.6 0 0 0-1.9-.5l-1.2.5-2-3.4.1-.1a1.6 1.6 0 0 0 .3-1.7l-.2-.7-1-.7V9l1-.7.2-.7a1.6 1.6 0 0 0-.3-1.7l-.1-.1 2-3.4 1.2.5a1.6 1.6 0 0 0 1.9-.5l.4-.8h4.6l.4.8a1.6 1.6 0 0 0 1.9.5l1.2-.5 2 3.4-.1.1a1.6 1.6 0 0 0-.3 1.7l.2.7 1 .7v3l-1 .7z"/>
</svg>
</div>

<span>Settings</span>

</a>

</nav>

</aside>


<!-- MAIN AREA -->

<div class="main">


<!-- TOP BAR -->

<header class="topbar">

<div class="top-right">

<div class="notification">

<svg viewBox="0 0 24 24">
<path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7"/>
<path d="M13.7 21a2 2 0 01-3.4 0"/>
</svg>

</div>


<div class="avatar">D</div>

</div>

</header>


<!-- PAGE CONTENT -->

<div class="content">

{% block content %}{% endblock %}

</div>

</div>

</div>

</body>
</html>
