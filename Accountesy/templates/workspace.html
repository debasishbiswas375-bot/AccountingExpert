{% extends "base.html" %}
{% block content %}
<div class="workspace-container">
    <h2>Tally Conversion Workspace</h2>
    <p>Drag and drop your files into the designated zones below.</p>

    <form id="upload-form" action="/convert/process" method="POST" enctype="multipart/form-data">
        <div class="drop-zone" id="bank-zone">
            <span class="drop-zone__prompt">Drop Bank Statement (PDF/Excel) here</span>
            <input type="file" name="bank_file" class="drop-zone__input" required>
        </div>

        <div class="drop-zone" id="master-zone">
            <span class="drop-zone__prompt">Drop Master.html here</span>
            <input type="file" name="master_file" class="drop-zone__input" required>
        </div>

        <button type="submit" class="btn-generate">🚀 Generate Tally XML</button>
    </form>
</div>

<script>
    document.querySelectorAll(".drop-zone__input").forEach((inputElement) => {
        const dropZoneElement = inputElement.closest(".drop-zone");

        dropZoneElement.addEventListener("click", (e) => { inputElement.click(); });

        inputElement.addEventListener("change", (e) => {
            if (inputElement.files.length) {
                dropZoneElement.querySelector(".drop-zone__prompt").textContent = inputElement.files[0].name;
                dropZoneElement.classList.add("drop-zone--active");
            }
        });

        dropZoneElement.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZoneElement.classList.add("drop-zone--over");
        });

        ["dragleave", "dragend"].forEach((type) => {
            dropZoneElement.addEventListener(type, (e) => {
                dropZoneElement.classList.remove("drop-zone--over");
            });
        });

        dropZoneElement.addEventListener("drop", (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length) {
                inputElement.files = e.dataTransfer.files;
                dropZoneElement.querySelector(".drop-zone__prompt").textContent = e.dataTransfer.files[0].name;
                dropZoneElement.classList.remove("drop-zone--over");
                dropZoneElement.classList.add("drop-zone--active");
            }
        });
    });
</script>
{% endblock %}
