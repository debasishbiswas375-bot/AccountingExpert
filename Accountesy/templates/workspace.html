{% extends "base.html" %}
{% block content %}
<div class="glass-card">
    <h1>AI Voucher Workspace</h1>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div onclick="document.getElementById('bank_file').click()" style="border: 2px dashed #fff; border-radius: 15px; padding: 30px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.1);">
            <i data-lucide="upload-cloud"></i>
            <p id="bank-label">1. Bank Statement (Required)</p>
            <input type="file" id="bank_file" hidden onchange="document.getElementById('bank-label').innerText = this.files[0].name">
        </div>
        <div onclick="document.getElementById('master_file').click()" style="border: 2px dashed rgba(255,255,255,0.3); border-radius: 15px; padding: 30px; text-align: center; cursor: pointer;">
            <i data-lucide="database"></i>
            <p id="master-label">2. Tally Master (Optional)</p>
            <input type="file" id="master_file" hidden onchange="document.getElementById('master-label').innerText = this.files[0].name">
        </div>
    </div>
    <button class="footer-btn" style="width: 100%; margin-top: 20px;">Start AI Processing</button>
</div>
{% endblock %}
