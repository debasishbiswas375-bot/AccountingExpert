{% extends "base.html" %}
{% block content %}
<div class="glass-card">
    <h1>AI Voucher Workspace</h1>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0;">
        <div onclick="document.getElementById('bank-input').click()" style="border: 2px dashed #fff; padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.05);">
            <i data-lucide="upload-cloud"></i>
            <p id="bank-label">Step 1: Bank Statement (Required)</p>
            <input type="file" id="bank-input" hidden onchange="document.getElementById('bank-label').innerText = this.files[0].name">
        </div>
        <div onclick="document.getElementById('master-input').click()" style="border: 2px dashed rgba(255,255,255,0.3); padding: 30px; border-radius: 15px; text-align: center; cursor: pointer;">
            <i data-lucide="database"></i>
            <p id="master-label">Step 2: Tally Master (Optional)</p>
            <input type="file" id="master-input" hidden onchange="document.getElementById('master-label').innerText = this.files[0].name">
        </div>
    </div>
    <button class="footer-btn" style="width: 100%;" onclick="startAI()">Start AI Processing</button>
</div>
{% endblock %}
