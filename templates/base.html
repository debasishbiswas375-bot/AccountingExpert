<!DOCTYPE html>
<html>
<head>
    <title>Accountesy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="topbar">
    <div class="top-left">
        <button class="hamburger" onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:white;"><i data-lucide="menu"></i></button>
        <img src="/static/logo.png" class="brand-logo">
        <div class="brand-text">
            <div class="brand-name">Accountesy</div>
            <div class="brand-tagline">Learn Smart, Grow Fast, Be Accounting Expert</div>
        </div>
    </div>
</div>
<div class="sidebar" id="sidebar">
    <div class="nav-section">
        <a href="/" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="/dashboard" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
        <a href="/plans" class="nav-item"><i data-lucide="credit-card"></i><span>Plans</span></a>
    </div>
    <div class="sponsor-box" style="text-align:center;">
        <div class="sponsor-title" style="font-size:10px;">Sponsored by</div>
        <div class="sponsor-name" style="font-size:14px;font-weight:600;">Uday Mondal</div>
        <img src="/static/logo1.png" style="width:50px;margin-top:5px;">
    </div>
</div>
<div class="main">{% block content %}{% endblock %}</div>
<script>
    function toggleSidebar(){ document.getElementById("sidebar").classList.toggle("mini"); }
    lucide.createIcons();
</script>
</body>
</html>
