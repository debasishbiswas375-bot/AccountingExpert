{% extends "base.html" %}
{% block content %}
<h2 class="brand-name">User Dashboard</h2>
<div class="dashboard-grid">
    <div class="glass-card"><h3>Credits</h3><div class="stat-value">120</div></div>
    <div class="glass-card"><h3>Active Plan</h3><div class="stat-value">Starter</div></div>
</div>
<div class="glass-card" style="text-align:center; padding:40px; border:2px dashed rgba(255,255,255,0.4);">
    <i data-lucide="upload-cloud" style="width:48px;height:48px;"></i>
    <h3>Upload Bank Statement</h3>
    <form action="/convert" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" style="margin:20px 0;">
        <br>
        <button type="submit" class="btn-convert">Convert to Tally XML</button>
    </form>
</div>
{% endblock %}
