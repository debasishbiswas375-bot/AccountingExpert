<!DOCTYPE html>
<html>
<head>
    <title>Register - Accountesy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: rgba(255,255,255,0.18); backdrop-filter: blur(30px); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.5); outline: none; font-family: 'Poppins'; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 14px; background: white; color: #1f56c2; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 15px; font-family: 'Poppins'; font-size: 16px; transition: 0.3s; }
        .auth-btn:hover { background: #f0f0f0; transform: translateY(-2px); }
        .auth-link { color: white; text-decoration: none; font-weight: 600; }
        .auth-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2 style="margin-top:0;">Create Account</h2>
            <p style="opacity: 0.8; margin-bottom: 25px;">Start converting your statements</p>
            <form action="/auth/register" method="POST">
                <input type="email" name="email" class="auth-input" placeholder="Email Address" required>
                <input type="password" name="password" class="auth-input" placeholder="Password" required>
                <button type="submit" class="auth-btn">Register</button>
            </form>
            <p style="margin-top: 25px; font-size: 14px;">Already have an account? <a href="/auth/login" class="auth-link">Login here</a></p>
        </div>
    </div>
</body>
</html>
