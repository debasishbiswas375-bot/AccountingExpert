{% extends "base.html" %}
{% block content %}
<div style="max-width: 1100px; margin: 0 auto; margin-bottom: 80px;">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
        <div>
            <h1 style="margin: 0; font-size: 2.2rem; color: #1e293b;">AI Smart Preview</h1>
            <p>File: <b>{{ filename }}</b></p>
        </div>

        <div class="glass-panel" style="padding: 15px 30px;">
            <b>Total:</b> {{ total_rows }} |
            <b>Cost:</b> {{ cost }} CR
        </div>
    </div>

    <form action="/workspace/final-convert" method="POST" id="finalForm">
        <input type="hidden" name="filename" value="{{ filename }}">
        <input type="hidden" name="changes" id="changesInput">

        <table style="width:100%;">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Ledger</th>
                </tr>
            </thead>

            <tbody>
                {% for row in preview %}
                <tr>
                    <td>{{ row.date }}</td>
                    <td>{{ row.description }}</td>
                    <td>{{ row.amount }}</td>
                    <td>
                        <select class="ledger-select" data-index="{{ loop.index0 }}">
                            <option selected>{{ row.ledger_name }}</option>
                            <option>Staff Welfare</option>
                            <option>Bank Charges</option>
                            <option>Fuel Expense</option>
                            <option>Suspense Account</option>
                        </select>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div style="text-align:center; margin-top:30px;">
            <button type="submit">Confirm & Download XML</button>
        </div>
    </form>
</div>

<script>
document.getElementById("finalForm").addEventListener("submit", function() {
    let changes = {};

    document.querySelectorAll(".ledger-select").forEach(el => {
        let index = el.getAttribute("data-index");
        let value = el.value;

        changes[index] = value;
    });

    document.getElementById("changesInput").value = JSON.stringify(changes);
});
</script>

{% endblock %}
