<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Accountesy</title>

  <link rel="stylesheet" href="/static/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="app-wrapper">

<!-- HEADER -->
<header>
  <div style="display:flex;align-items:center;">
    <img src="/static/assets/logo.png" style="height:34px;margin-right:10px;">
    <h1>Accountesy</h1>
    <span style="margin-left:8px;background:#4facfe;padding:2px 8px;border-radius:12px;font-size:0.65rem;">PRO</span>
  </div>

  <div class="header-actions">

    <!-- NOTIFICATION -->
    <div style="position:relative;">
      <div class="icon-button" onclick="toggleNotif()">🔔</div>
      <div id="notifDropdown" class="dropdown">
        <div class="dropdown-item">🔔 No notifications</div>
      </div>
    </div>

    <!-- AVATAR -->
    <div style="position:relative;">
      <div class="avatar-bubble" onclick="toggleMenu()">D</div>
      <div id="avatarMenu" class="dropdown">
        <div class="dropdown-item">👤 Profile</div>
        <div class="dropdown-item">🚪 Logout</div>
      </div>
    </div>

  </div>
</header>

<!-- MAIN -->
<div class="main-layout">

  <nav class="sidebar">
    <div>
      <a href="/dashboard" class="nav-item active">Dashboard</a>
      <a href="/workspace" class="nav-item">Workspace</a>
      <a href="/history" class="nav-item">History</a>
    </div>

    <div style="text-align:center;">
      <img src="/static/assets/logo1.png" style="width:40px;">
      <p style="font-size:0.6rem;">Powered by Uday Mondal</p>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

</div>

<!-- FOOTER -->
<footer>
  Created by <b>&nbsp;Debasish Biswas</b> © 2026
</footer>

</div>

<!-- JS -->
<script>
function toggleNotif() {
  document.getElementById("notifDropdown").classList.toggle("show");
  document.getElementById("avatarMenu").classList.remove("show");
}

function toggleMenu() {
  document.getElementById("avatarMenu").classList.toggle("show");
  document.getElementById("notifDropdown").classList.remove("show");
}

document.addEventListener("click", function(e) {
  if (!e.target.closest(".header-actions")) {
    document.getElementById("notifDropdown").classList.remove("show");
    document.getElementById("avatarMenu").classList.remove("show");
  }
});
</script>

</body>
</html>
