<!DOCTYPE html>
<html>
<head>
    <title>Accountesy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- ================= TOPBAR ================= -->

<div class="topbar">

    <div class="top-left">
        <button class="hamburger" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <img src="/static/logo.png" class="brand-logo">

        <div class="brand-text">
            <div class="brand-name">Accountesy</div>
            <div class="brand-tagline">
                Learn Smart, Grow Fast, Be Accounting Expert with Accountesy
            </div>
        </div>
    </div>

    <div class="top-right">

        <!-- Notification -->
        <div class="notification-container">
            <div class="notification-icon" onclick="toggleNotification()">
                <i data-lucide="bell"></i>
                <span class="notif-dot"></span>
            </div>

            <div class="notification-menu" id="notificationMenu">
                <div class="notif-title">Notifications</div>
                <div class="notif-item">New user registered</div>
                <div class="notif-item">Plan upgraded</div>
                <div class="notif-item">System update available</div>
            </div>
        </div>

        <!-- Avatar -->
        <div class="avatar-container">
            <div class="avatar" onclick="toggleProfileMenu()">D</div>

            <div class="profile-menu" id="profileMenu">
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="#">Logout</a>
            </div>
        </div>

    </div>

</div>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar" id="sidebar">

    <div class="nav-section">

        <a href="/" class="nav-item">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
        </a>

        <a href="/admin" class="nav-item">
            <i data-lucide="shield"></i>
            <span>Admin</span>
        </a>

        <a href="/plans" class="nav-item">
            <i data-lucide="credit-card"></i>
            <span>Plans</span>
        </a>

        <a href="#" class="nav-item">
            <i data-lucide="settings"></i>
            <span>Settings</span>
        </a>

    </div>

    <div class="sponsor-box">
        <div class="sponsor-title">Sponsored by</div>
        <div class="sponsor-name">
            Uday Mondal | Tax Consultant Advocate
        </div>
        <img src="/static/logo1.png" class="sponsor-logo">
    </div>

</div>

<!-- ================= MAIN ================= -->

<div class="main">
    {% block content %}{% endblock %}
</div>

<!-- ================= JS ================= -->

<script>

function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("mini");
}

function toggleProfileMenu(){
    document.getElementById("profileMenu").classList.toggle("show");
}

function toggleNotification(){
    document.getElementById("notificationMenu").classList.toggle("show");
}

window.onclick = function(e){

    if(!e.target.closest('.avatar-container')){
        document.getElementById("profileMenu")?.classList.remove("show");
    }

    if(!e.target.closest('.notification-container')){
        document.getElementById("notificationMenu")?.classList.remove("show");
    }
}

lucide.createIcons();

</script>

</body>
</html>
