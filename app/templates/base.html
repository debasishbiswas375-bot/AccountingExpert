<!DOCTYPE html>
<html>
<head>
    <title>accountesy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

    <div class="left-section">
        <button class="hamburger" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <img src="/static/logo.png" class="main-logo">
        <div class="brand-block">
            <span class="brand-text">accountesy</span>
            <span class="tagline">learn smart, grow fast, be accounting expert</span>
        </div>
    </div>

    <div class="right-section">
        <i data-lucide="bell"></i>
        <div class="avatar">D</div>
    </div>

</div>


<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="menu-section">

        <a href="/" class="nav-item">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
        </a>

        <a href="/admin" class="nav-item">
            <i data-lucide="shield"></i>
            <span>Admin</span>
        </a>

        <a href="/plans" class="nav-item">
            <i data-lucide="credit-card"></i>
            <span>Plans</span>
        </a>

        <a href="#" class="nav-item">
            <i data-lucide="settings"></i>
            <span>Settings</span>
        </a>

    </div>

    <!-- SPONSOR -->
    <div class="sponsor">
        <span>Sponsored by</span>
        <img src="/static/logo.png" class="sponsor-logo">
    </div>

</div>


<!-- MAIN CONTENT -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("mini");
}
lucide.createIcons();
</script>

</body>
</html>
