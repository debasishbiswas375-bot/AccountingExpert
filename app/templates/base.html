<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountesy | Enterprise Pro</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

    <header class="glass-panel" style="height: 70px; display: flex; align-items: center; padding: 0 30px; margin: 10px; border-radius: 25px; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="/static/assets/logo.png" style="width: 35px;">
            <h2 style="margin: 0; color: #1e40af; font-size: 1.2rem;">Accountesy</h2>
        </div>
        <div style="background: var(--primary-blue); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;">Pro Plan</div>
    </header>

    <div style="display: flex; flex: 1; overflow: hidden;">
        <nav class="sidebar glass-panel" id="mainSidebar">
            <button onclick="toggleSidebar()" style="background:none; border:none; cursor:pointer; margin-bottom:20px; color:var(--nav-text);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>

            <div class="nav-links">
                <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
                    <span>🏠</span> <span class="nav-text">Dashboard</span>
                </a>
                <a href="/workspace" class="nav-item {% if request.url.path == '/workspace' %}active{% endif %}">
                    <span>🚀</span> <span class="nav-text">Workspace</span>
                </a>
                <a href="/history" class="nav-item {% if request.url.path == '/history' %}active{% endif %}">
                    <span>🕒</span> <span class="nav-text">History</span>
                </a>
            </div>

            <div class="sponsor-section" style="margin-top: auto; text-align: center;">
                <p style="font-size: 0.6rem; opacity: 0.6; margin:0;">Sponsored by</p>
                <img src="/static/assets/logo1.png" style="width: 50px; margin: 5px 0;">
                <p style="font-weight: bold; font-size: 0.75rem; margin:0;">Uday Mondal</p>
            </div>
        </nav>

        <main style="flex: 1; padding: 40px; overflow-y: auto;">
            {% block content %}{% endblock %}
        </main>
    </div>

    <footer class="site-footer glass-panel">
        <span style="font-size: 0.85rem; color: #475569;">
            Created by <b>Debasish Biswas</b> | © 2026 All Rights Reserved
        </span>
    </footer>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('mainSidebar');
            sb.classList.toggle('collapsed');
            localStorage.setItem('sbState', sb.classList.contains('collapsed') ? 'mini' : 'full');
        }
        if(localStorage.getItem('sbState') === 'mini') document.getElementById('mainSidebar').classList.add('collapsed');
    </script>
</body>
</html>
