<!DOCTYPE html>
<html>
<head>
    <title>Accounting Expert</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="left-section">
        <button class="hamburger" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <img src="/static/logo.png" class="logo-img">
        <span class="logo-text">Accounting Expert</span>
        <span class="plan-badge">Free Plan</span>
    </div>

    <div class="top-right">
        <i data-lucide="bell"></i>
        <div class="avatar">D</div>
    </div>
</div>

<!-- FLOATING BUBBLE SIDEBAR -->
<div class="sidebar" id="sidebar">

    <a href="/" class="item">
        <i data-lucide="layout-dashboard"></i>
        <span>Dashboard</span>
    </a>

    <a href="/admin" class="item">
        <i data-lucide="shield"></i>
        <span>Admin</span>
    </a>

    <a href="/plans" class="item">
        <i data-lucide="credit-card"></i>
        <span>Plans</span>
    </a>

    <a href="#" class="item">
        <i data-lucide="settings"></i>
        <span>Settings</span>
    </a>

</div>

<!-- MAIN -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("mini");
}
lucide.createIcons();
</script>

</body>
</html>
