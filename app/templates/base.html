<!DOCTYPE html>
<html>
<head>
    <title>Accounting Expert</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Topbar -->
<div class="topbar">
    <div class="logo-area">
        <img src="/static/logo.png" class="logo-img">
        <span class="logo-text">Accounting Expert</span>
    </div>

    <div class="profile-menu">
        <div class="profile-btn" onclick="toggleMenu()">A</div>
        <div class="dropdown" id="dropdown">
            <a href="/">Dashboard</a>
            <a href="/admin">Admin</a>
            <a href="#">Profile</a>
            <a href="#">Logout</a>
        </div>
    </div>
</div>

<!-- Bubble Sidebar -->
<div class="sidebar">
    <div class="menu-title">MENU</div>
    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
    <a href="/admin" class="{% if request.url.path == '/admin' %}active{% endif %}">Admin</a>
    <a href="#">Billing</a>
    <a href="#">Settings</a>
</div>

<!-- Main -->
<div class="main">
    {% block content %}{% endblock %}
</div>

<script>
function toggleMenu() {
    document.getElementById("dropdown").classList.toggle("show");
}
</script>

</body>
</html>
