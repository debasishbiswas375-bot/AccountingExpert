<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Accounting Expert</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<header class="topbar">

    <div class="left">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <i data-lucide="menu"></i>
        </button>

        <div class="brand">
            <img src="/static/logo.png">
            <span>Accounting Expert</span>
            <span class="plan">Free Plan</span>
        </div>
    </div>

    <div class="right">
        <i data-lucide="bell"></i>
        <div class="avatar">D</div>
    </div>

</header>

<aside class="sidebar" id="sidebar">

    <a href="/" class="item active">
        <i data-lucide="layout-dashboard"></i>
        <span>Dashboard</span>
    </a>

    <a href="/admin" class="item">
        <i data-lucide="shield"></i>
        <span>Admin</span>
    </a>

    <a href="#" class="item">
        <i data-lucide="credit-card"></i>
        <span>Billing</span>
    </a>

    <a href="#" class="item">
        <i data-lucide="settings"></i>
        <span>Settings</span>
    </a>

</aside>

<main class="content">
    <h1>Dashboard</h1>
    <p>Welcome to Accounting Expert Enterprise UI</p>
</main>

<script>
lucide.createIcons();
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("mini");
}
</script>

</body>
</html>
