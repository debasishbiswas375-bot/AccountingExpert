<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accountesy</title>

    <!-- Favicon -->
    <link rel="icon" href="/static/assets/logo.png">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/main.css">

    <!-- Icons (Heroicons CDN) -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <div class="header-left">
        <button id="menuToggle" class="menu-btn">☰</button>

        <img src="/static/assets/logo.png" class="logo">
        <span class="brand">Accountesy</span>

        <!-- PLAN BADGE -->
        <span class="badge {{ user.plans.name | lower }}">
            {{ user.plans.name }}
        </span>
    </div>

    <div class="header-right">
        <!-- Notification -->
        <div class="icon-bell">
            <i data-feather="bell"></i>
            <span class="dot"></span>
        </div>

        <!-- Avatar -->
        <div class="avatar">
            {{ user.username[0]|upper if user.username else "D" }}
        </div>
    </div>
</header>


<!-- ================= SIDEBAR ================= -->
<aside id="sidebar" class="sidebar expanded">

    <nav>
        <a href="/dashboard" class="nav-item active">
            <i data-feather="grid"></i>
            <span>Dashboard</span>
        </a>

        <a href="/workspace" class="nav-item">
            <i data-feather="layers"></i>
            <span>Workspace</span>
        </a>

        <a href="/history" class="nav-item">
            <i data-feather="clock"></i>
            <span>History</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <img src="/static/assets/logo1.png">
        <span>Sponsored by Uday Mondal | Tax Consultant Advocate</span>
    </div>
</aside>


<!-- ================= MAIN ================= -->
<main class="main">
    {% block content %}{% endblock %}
</main>


<!-- ================= FOOTER ================= -->
<footer class="footer">
    <div class="footer-bubble">
        Created by <b>Debasish Biswas</b> © 2026
    </div>
</footer>


<!-- ================= JS ================= -->
<script>
    feather.replace();

    const sidebar = document.getElementById("sidebar");
    const toggle = document.getElementById("menuToggle");

    toggle.onclick = () => {
        sidebar.classList.toggle("collapsed");
    };
</script>

</body>
</html>
