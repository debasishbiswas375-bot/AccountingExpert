<!DOCTYPE html>
<html>
<head>
    <title>accountesy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="shortcut icon" href="/static/logo.png">

    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- ================= TOPBAR ================= -->

<div class="topbar">

    <div class="top-left">

        <button class="hamburger" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <img src="/static/logo.png" class="brand-logo">

        <div class="brand-text">
            <div class="brand-name">accountesy</div>
            <div class="brand-tagline">
                learn smart, grow fast, be accounting expert
            </div>
        </div>

    </div>

    <div class="top-right">
        <i data-lucide="bell"></i>
        <div class="avatar">D</div>
    </div>

</div>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar" id="sidebar">

    <div class="nav-section">

        <a href="/" class="nav-item">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
        </a>

        <a href="/admin" class="nav-item">
            <i data-lucide="shield"></i>
            <span>Admin</span>
        </a>

        <a href="/plans" class="nav-item">
            <i data-lucide="credit-card"></i>
            <span>Plans</span>
        </a>

        <a href="#" class="nav-item">
            <i data-lucide="settings"></i>
            <span>Settings</span>
        </a>

    </div>

    <!-- SPONSOR SECTION -->
    <div class="sponsor-box">
        <div class="sponsor-title">Sponsored by</div>
        <div class="sponsor-name">
            Uday Mondal | Tax Consultant Advocate
        </div>
        <img src="/static/logo1.png" class="sponsor-logo">
    </div>

</div>

<!-- ================= MAIN CONTENT ================= -->

<div class="main">
    {% block content %}{% endblock %}
</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("mini");
}
lucide.createIcons();
</script>

</body>
</html>
