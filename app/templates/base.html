<!DOCTYPE html>
<html>
<head>
    <title>Accounting Expert</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">

    <div class="logo-area">
        <img src="/static/logo.png" class="logo-img">
        <span class="logo-text">Accounting Expert</span>
        <span class="plan-badge">Free Plan</span>
    </div>

    <div class="top-right">

        <!-- Notification -->
        <div class="notification" onclick="toggleNotifications()">
            <i data-lucide="bell"></i>
            <span class="notif-dot"></span>

            <div class="notification-panel" id="notificationPanel">
                <div class="notif-item">New user registered</div>
                <div class="notif-item">Plan upgraded</div>
                <div class="notif-item">Backup completed</div>
            </div>
        </div>

        <!-- User -->
        <div class="user-profile" onclick="toggleProfile()">
            <div class="avatar">D</div>

            <div class="user-info">
                <div class="name">
                    Debasish
                    <span class="admin-badge">Admin</span>
                </div>
                <div class="email">admin@accounting.com</div>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <a href="#">My Profile</a>
                <a href="#">Settings</a>
                <a href="#">Logout</a>
            </div>
        </div>

    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="sidebar-header">
        <span class="brand">MENU</span>
        <button class="collapse-btn" onclick="toggleSidebar()">
            <i data-lucide="chevron-left"></i>
        </button>
    </div>

    <a href="/" class="active">
        <i data-lucide="layout-dashboard"></i>
        <span class="text">Dashboard</span>
    </a>

    <a href="/admin">
        <i data-lucide="shield"></i>
        <span class="text">Admin</span>
    </a>

    <a href="#">
        <i data-lucide="credit-card"></i>
        <span class="text">Billing</span>
    </a>

    <a href="#">
        <i data-lucide="settings"></i>
        <span class="text">Settings</span>
    </a>

</div>

<!-- MAIN CONTENT -->
<div class="main">
    {% block content %}{% endblock %}
</div>

<script>
function toggleProfile() {
    document.getElementById("profileDropdown").classList.toggle("show-profile");
}

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
}

function toggleNotifications() {
    document.getElementById("notificationPanel").classList.toggle("show-notifications");
}

/* Counter Animation */
function animateCounter(el, target) {
    let count = 0;
    let speed = target / 60;

    function update() {
        count += speed;
        if (count < target) {
            el.innerText = Math.floor(count);
            requestAnimationFrame(update);
        } else {
            el.innerText = target;
        }
    }
    update();
}

window.onload = function() {
    document.querySelectorAll(".counter").forEach(el => {
        animateCounter(el, parseInt(el.dataset.target));
    });
};

lucide.createIcons();
</script>

</body>
</html>
