<!DOCTYPE html>
<html>
<head>
    <title>Accounting Expert</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- Loader -->
<div class="loader" id="loader">
    <div class="loader-circle"></div>
</div>

<!-- TOPBAR -->
<div class="topbar">

    <!-- Left -->
    <div class="left-section">
        <!-- Hamburger -->
        <button class="hamburger" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <img src="/static/logo.png" class="logo-img">
        <span class="logo-text">Accounting Expert</span>
        <span class="plan-badge">Free Plan</span>
    </div>

    <!-- Right -->
    <div class="top-right">

        <div class="notification" onclick="toggleNotifications()">
            <i data-lucide="bell"></i>
            <span class="notif-dot"></span>

            <div class="notification-panel" id="notificationPanel">
                <div class="notif-item">New user registered</div>
                <div class="notif-item">Plan upgraded</div>
                <div class="notif-item">Backup completed</div>
            </div>
        </div>

        <div class="user-profile" onclick="toggleProfile()">
            <div class="avatar">D</div>

            <div class="profile-dropdown" id="profileDropdown">
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="#">Logout</a>
            </div>
        </div>

    </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <a href="/" class="active">
        <i data-lucide="layout-dashboard"></i>
        <span class="text">Dashboard</span>
    </a>

    <a href="/admin">
        <i data-lucide="shield"></i>
        <span class="text">Admin</span>
    </a>

    <a href="#">
        <i data-lucide="credit-card"></i>
        <span class="text">Billing</span>
    </a>

    <a href="#">
        <i data-lucide="settings"></i>
        <span class="text">Settings</span>
    </a>

</div>

<!-- MAIN -->
<div class="main">
    {% block content %}{% endblock %}
</div>

<script>

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("show");
    document.getElementById("overlay").classList.toggle("show");
}

function toggleProfile() {
    document.getElementById("profileDropdown").classList.toggle("show-profile");
}

function toggleNotifications() {
    document.getElementById("notificationPanel").classList.toggle("show-notifications");
}

window.addEventListener("load", function() {
    document.getElementById("loader").classList.add("hidden");
});

lucide.createIcons();

</script>

</body>
</html>
