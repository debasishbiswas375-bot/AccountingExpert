<!DOCTYPE html>
<html>
<head>
    <title>Accounting Expert</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Top Navigation -->
<div class="topbar">

    <!-- Logo Left -->
    <div class="logo-area">
        <img src="/static/logo.png" class="logo-img">
        <span class="logo-text">Accounting Expert</span>
    </div>

    <!-- User Profile Right -->
    <div class="user-profile" onclick="toggleProfile()">
        <div class="avatar">D</div>
        <div class="user-info">
            <div class="name">Debasish</div>
            <div class="email">admin@accounting.com</div>
        </div>

        <div class="profile-dropdown" id="profileDropdown">
            <a href="#">My Profile</a>
            <a href="#">Settings</a>
            <a href="#">Logout</a>
        </div>
    </div>

</div>

<!-- Glass Sidebar -->
<div class="sidebar">

    <div class="menu-title">MAIN</div>

    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
        Dashboard
    </a>

    <a href="/admin" class="{% if request.url.path == '/admin' %}active{% endif %}">
        Admin
    </a>

    <a href="#">Billing</a>
    <a href="#">Settings</a>

</div>

<!-- Main Content -->
<div class="main">
    {% block content %}{% endblock %}
</div>

<script>
function toggleProfile() {
    document.getElementById("profileDropdown").classList.toggle("show-profile");
}
</script>

</body>
</html>
