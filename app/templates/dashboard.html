{% extends "base.html" %}

{% block content %}

<div class="page-title">
    Dashboard
</div>

<div class="dashboard-cards">

    <div class="card">
        <div class="card-title">Remaining Credits</div>
        <div class="card-value">
            {{ credits if credits else "Guest Mode" }}
        </div>
    </div>

    <div class="card">
        <div class="card-title">Converted Vouchers</div>
        <div class="card-value">
            {{ conversions if conversions else "0" }}
        </div>
    </div>

    <div class="card">
        <div class="card-title">Current Plan</div>
        <div class="card-value">
            {{ plan if plan else "Free / Guest" }}
        </div>
    </div>

</div>

{% endblock %}
