{% extends "base.html" %}
{% block content %}

<h2>Dashboard</h2>

<div class="stats">

<div class="card">Plan: {{data.plan}}</div>
<div class="card">Credits: {{data.credits}}</div>
<div class="card">Expiry: {{data.expiry}}</div>
<div class="card">Conversions: {{data.conversions}}</div>

</div>

<h3>Upload Bank Statement</h3>

<form action="/convert" method="post" enctype="multipart/form-data">

<input type="file" name="file">

<button class="btn">Convert</button>

</form>

{% endblock %}
