{% extends "base.html" %}

{% block content %}

<div class="page-title">Admin Dashboard</div>

<div class="dashboard-cards">

<div class="card">
<div class="card-title">Total Users</div>
<div class="card-value">{{ total_users }}</div>
</div>

<div class="card">
<div class="card-title">Total Conversions</div>
<div class="card-value">{{ total_conversions }}</div>
</div>

<div class="card">
<div class="card-title">Total Plans</div>
<div class="card-value">{{ total_plans }}</div>
</div>

<div class="card">
<div class="card-title">Credits Used</div>
<div class="card-value">{{ credits_used }}</div>
</div>

</div>

{% endblock %}
