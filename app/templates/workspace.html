{% extends "base.html" %}
{% block content %}
<div style="max-width: 850px; margin: 0 auto;">
    <div style="margin-bottom: 40px;">
        <h1 style="font-size: 2.5rem; font-weight: 800; color: white; margin-bottom: 10px;">Workspace</h1>
        <p style="color: #64748b; font-size: 1.1rem;">Upload your bank statement Excel files for Pro-tier conversion.</p>
    </div>

    <div class="glass-panel" style="padding: 60px 40px; border-radius: 40px; text-align: center;">
      <form action="/workspace/convert-excel" method="POST" enctype="multipart/form-data">
            <div id="drop-zone" style="border: 2px dashed rgba(59, 130, 246, 0.4); border-radius: 30px; padding: 80px 20px; background: rgba(255, 255, 255, 0.3); cursor: pointer; transition: 0.3s;" 
                 onclick="document.getElementById('fileInput').click()">
                
                <div style="font-size: 50px; margin-bottom: 20px;">📄</div>
                <h3 style="color: #1e293b; font-size: 1.5rem; margin: 0 0 10px 0;">Drag & drop your file here</h3>
                <p style="color: #64748b; margin-bottom: 30px;">Supports .xlsx, .xls, and .csv</p>
                
                <input type="file" name="file" id="fileInput" style="display: none;" accept=".xlsx, .xls, .csv">
                
                <button type="button" style="background: white; color: var(--primary-blue); border: 1.5px solid var(--primary-blue); padding: 12px 40px; border-radius: 30px; font-weight: 700; cursor: pointer; transition: 0.3s;">
                    Browse Computer
                </button>
            </div>

            <div id="submit-section" style="margin-top: 40px; display: none;">
                <div style="background: rgba(255,255,255,0.8); padding: 15px 30px; border-radius: 20px; display: inline-flex; align-items: center; gap: 10px; border: 1px solid white; margin-bottom: 25px;">
                    <span style="color: #10b981;">✔</span>
                    <span id="file-name-display" style="font-weight: 600; color: #334155;"></span>
                </div>
                <br>
                <button type="submit" style="background: var(--primary-blue); color: white; border: none; padding: 18px 60px; border-radius: 35px; font-size: 1.1rem; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);">
                    Start Conversion
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const submitSection = document.getElementById('submit-section');
    const fileNameDisplay = document.getElementById('file-name-display');

    fileInput.addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
            fileNameDisplay.textContent = this.files[0].name;
            submitSection.style.display = 'block';
            document.getElementById('drop-zone').style.borderColor = '#10b981';
            document.getElementById('drop-zone').style.background = 'rgba(16, 185, 129, 0.05)';
        }
    });
</script>
{% endblock %}
