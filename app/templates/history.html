{% extends "base.html" %}

{% block content %}

<div class="page-title">Conversion History</div>

<table class="history-table">

<tr>
<th>Date</th>
<th>Voucher Count</th>
<th>Credits Used</th>
</tr>

{% for r in records %}

<tr>
<td>{{ r.converted_date }}</td>
<td>{{ r.voucher_count }}</td>
<td>{{ r.credits_used }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
