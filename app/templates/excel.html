{% extends "base.html" %}
{% block content %}

<div class="main-content">
    <div class="center-box">

        <h1>Statement Convert (Free Tool)</h1>
        <p>Upload PDF → Download Excel / XML</p>

        <form action="/convert-excel" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept=".pdf" required>

            <div class="btn-group">
                <button type="submit" formaction="/convert-excel">Convert to Excel</button>
                <button type="submit" formaction="/convert-xml">Convert to XML</button>
            </div>
        </form>

        <p class="note">Guest mode supported (no history saved)</p>

    </div>
</div>

<style>
.center-box {
    width: 500px;
    margin: 80px auto;
    padding: 30px;
    background: rgba(255,255,255,0.9);
    border-radius: 12px;
    text-align: center;
}

.center-box h1 {
    margin-bottom: 10px;
}

input[type="file"] {
    margin: 20px 0;
}

.btn-group button {
    margin: 10px;
    padding: 12px 20px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.btn-group button:hover {
    background: #0056b3;
}

.note {
    margin-top: 20px;
    color: gray;
}
</style>

{% endblock %}
