{% extends "base.html" %}
{% block content %}

<div style="display:flex; justify-content:center; align-items:center; height:80vh;">

<div style="width:380px; background:rgba(255,255,255,0.95); padding:30px; border-radius:16px; color:black;">

    <h2 id="title">Login</h2>

    <!-- LOGIN -->
    <form id="loginForm">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" style="display:none;">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Create Account</button>
    </form>

    <p style="margin-top:15px;">
        <span id="toggleText">No account?</span>
        <a href="#" onclick="toggleMode()">Create one</a>
    </p>

</div>

</div>

<script>
let isLogin = true;

function toggleMode(){
    isLogin = !isLogin;

    document.getElementById("loginForm").style.display = isLogin ? "block" : "none";
    document.getElementById("registerForm").style.display = isLogin ? "none" : "block";
    document.getElementById("title").innerText = isLogin ? "Login" : "Register";
    document.getElementById("toggleText").innerText = isLogin ? "No account?" : "Have account?";
}

/* LOGIN */
document.getElementById("loginForm").onsubmit = async (e)=>{
    e.preventDefault();
    let data = new FormData(e.target);

    let res = await fetch("/login", {
        method:"POST",
        body:data
    });

    if(res.ok){
        window.location.href = "/dashboard";
    }
};

/* REGISTER */
document.getElementById("registerForm").onsubmit = async (e)=>{
    e.preventDefault();
    let data = new FormData(e.target);

    let res = await fetch("/register", {
        method:"POST",
        body:data
    });

    alert("Check your email for verification!");
};
</script>

{% endblock %}
