{% extends "base.html" %}

{% block content %}

<div class="page-title">Plans & Pricing</div>

<div class="plans-grid">

{% for plan in plans %}

<div class="plan-card">

<h2>{{ plan.name }}</h2>

<div class="plan-credit">
Credits: {{ plan.credits }}
</div>

<div class="plan-price">
₹{{ plan.price }}
</div>

<div class="plan-duration">
{{ plan.duration_days }} Days
</div>

<button class="buy-btn">
Buy Plan
</button>

</div>

{% endfor %}

</div>

{% endblock %}
