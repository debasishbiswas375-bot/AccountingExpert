<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Security Gate | Admin</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; background: #0f172a;">
    <div class="glass-panel" style="padding: 50px; border-radius: 35px; width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.15);">
        <div style="font-size: 40px; margin-bottom: 15px;">🛡️</div>
        <h2 style="color: white; margin: 0 0 10px 0;">Admin Gateway</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 35px;">Identity verification required.</p>
        
        <form action="/admin/login" method="POST">
            <input type="text" name="username" placeholder="Admin ID" required 
                   style="width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 15px; border: none; background: rgba(255,255,255,0.08); color: white; outline: none; box-sizing: border-box;">
            
            <input type="password" name="password" placeholder="Passcode" required 
                   style="width: 100%; padding: 15px; margin-bottom: 30px; border-radius: 15px; border: none; background: rgba(255,255,255,0.08); color: white; outline: none; box-sizing: border-box;">
            
            <button type="submit" style="width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--primary-blue); color: white; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s;">
                Authenticate
            </button>
        </form>
    </div>
</body>
</html>
